name: LiveStage v1.1 validation

on:
  workflow_dispatch:
  push:
    branches: ["livestage-v1.1.0"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Run Android Lint
        working-directory: livestage-v1.1
        run: gradle lintDebug
      - name: Build debug APK
        working-directory: livestage-v1.1
        run: gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: LiveStage-Studio-v1.1.0
          path: |
            livestage-v1.1/app/build/outputs/apk/debug/app-debug.apk
            livestage-v1.1/app/build/reports/lint-results-debug.html
          retention-days: 30
