name: LiveStage v1.1 validation

on:
  workflow_dispatch:
  push:
    branches: ["livestage-v1.1.0"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Run Android Lint
        working-directory: livestage-v1.1
        run: gradle lintDebug
      - name: Build debug APK
        working-directory: livestage-v1.1
        run: gradle assembleDebug
      - name: Prepare verified package
        run: |
          mkdir -p verified/LiveStage-Studio-v1.1.0/source
          cp livestage-v1.1/app/build/outputs/apk/debug/app-debug.apk verified/LiveStage-Studio-v1.1.0/LiveStage-Studio-v1.1.0.apk
          cp livestage-v1.1/app/build/reports/lint-results-debug.html verified/LiveStage-Studio-v1.1.0/lint-results-debug.html
          rsync -a --exclude build --exclude .gradle livestage-v1.1/ verified/LiveStage-Studio-v1.1.0/source/
          cd verified/LiveStage-Studio-v1.1.0
          sha256sum LiveStage-Studio-v1.1.0.apk > SHA256SUMS.txt
      - uses: actions/upload-artifact@v4
        with:
          name: LiveStage-Studio-v1.1.0-verified
          path: verified/LiveStage-Studio-v1.1.0
          retention-days: 30
