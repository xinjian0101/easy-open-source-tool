name: LiveStage
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - run: gradle assembleDebug
        working-directory: livestage-app
      - uses: actions/upload-artifact@v4
        with:
          name: LiveStage-Studio-APK
          path: livestage-app/app/build/outputs/apk/debug/app-debug.apk
